        '
  - - TextContainer
    - - 'Once you are able to fully run under Python 3 you will want to make sure
        your code always works under

        '
      - 'both Python 2 & 3. Probably the best tool for running your tests under multiple
        Python interpreters is tox.

        '
      - 'You can then integrate tox with your continuous integration system so that
        you never accidentally break

        '
      - 'Python 2 or 3 support.

        '
      - 'You may also want to use the -bb flag with the Python 3 interpreter to trigger
        an exception when you are

        '
      - 'comparing bytes to strings or bytes to an int (the latter is available starting
        in Python 3.5). By default

        '
      - 'type-differing comparisons simply return False, but if you made a mistake
        in your separation of text/binary

        '
      - "data handling or indexing on bytes you wouldn\u2019t easily find the mistake.\
        \ This flag will raise an exception\n"
      - 'when these kinds of comparisons occur, making the mistake much easier to
        track down.

        '
      - "And that\u2019s mostly it! At this point your code base is compatible with\
        \ both Python 2 and 3 simultaneously.\n"
      - "Your testing will also be set up so that you don\u2019t accidentally break\
