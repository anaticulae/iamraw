- children:
  - - TextContainer
    - - '1 The Short Explanation

        '
  - - TextContainer
    - - 'To make your project be single-source Python 2/3 compatible, the basic steps
        are:

        '
  - - TextContainer
    - - '1. Only worry about supporting Python 2.7

        '
      - '2. Make sure you have good test coverage (coverage.py can help; pip install
        coverage)

        '
      - '3. Learn the differences between Python 2 & 3

        '
      - '4. Use Futurize (or Modernize) to update your code (e.g. pip install future)

        '
      - "5. Use Pylint to help make sure you don\u2019t regress on your Python 3 support\
        \ (pip install pylint)\n"
      - '6. Use caniusepython3 to find out which of your dependencies are blocking
        your use of Python 3 (pip

        '
  - - TextContainer
    - - 'install caniusepython3)

        '
  - - TextContainer
    - - '7. Once your dependencies are no longer blocking you, use continuous integration
        to make sure you stay

        '
      - 'compatible with Python 2 & 3 (tox can help test against multiple versions
        of Python; pip install

        '
      - 'tox)

        '
  - - TextContainer
    - - '8. Consider using optional static type checking to make sure your type usage
        works in both Python 2 &

        '
  - - TextContainer
    - - '3 (e.g. use mypy to check your typing under both Python 2 & Python 3).

        '
  - - TextContainer
    - - '2 Details

        '
  - - TextContainer
    - - 'A key point about supporting Python 2 & 3 simultaneously is that you can
        start today! Even if your

        '
      - "dependencies are not supporting Python 3 yet that does not mean you can\u2019\
        t modernize your code now to\n"
      - 'support Python 3. Most changes required to support Python 3 lead to cleaner
        code using newer practices

        '
      - 'even in Python 2 code.

        '
      - 'Another key point is that modernizing your Python 2 code to also support
        Python 3 is largely automated

        '
      - 'for you. While you might have to make some API decisions thanks to Python
        3 clarifying text data versus

        '
      - 'binary data, the lower-level work is now mostly done for you and thus can
        at least benefit from the automated

        '
      - 'changes immediately.

        '
      - 'Keep those key points in mind while you read on about the details of porting
        your code to support Python

        '
      - '2 & 3 simultaneously.

        '
  - - TextContainer
    - - '2.1 Drop support for Python 2.6 and older

        '
  - - TextContainer
    - - 'While you can make Python 2.5 work with Python 3, it is much easier if you
        only have to work with Python

        '
      - '2.7. If dropping Python 2.5 is not an option then the six project can help
        you support Python 2.5 & 3

        '
      - 'simultaneously (pip install six). Do realize, though, that nearly all the
        projects listed in this HOWTO

        '
      - 'will not be available to you.

        '
      - 'If you are able to skip Python 2.5 and older, then the required changes to
        your code should continue to

        '
      - 'look and feel like idiomatic Python code. At worst you will have to use a
        function instead of a method

        '
      - 'in some instances or have to import a function instead of using a built-in
        one, but otherwise the overall

        '
      - 'transformation should not feel foreign to you.

        '
      - 'But you should aim for only supporting Python 2.7. Python 2.6 is no longer
        freely supported and thus is

        '
      - 'not receiving bugfixes. This means you will have to work around any issues
        you come across with Python

        '
      - '2.6. There are also some tools mentioned in this HOWTO which do not support
        Python 2.6 (e.g., Pylint),

        '
      - 'and this will become more commonplace as time goes on. It will simply be
        easier for you if you only support

        '
      - 'the versions of Python that you have to support.

        '
  - - TextContainer
    - - '2

        '
  page: 2
- children:
  - - TextContainer
    - - '2.2 Make sure you specify the proper version support in your setup.py file

        '
  - - TextContainer
    - - 'In your setup.py file you should have the proper trove classifier specifying
        what versions of Python you

        '
      - 'support. As your project does not support Python 3 yet you should at least
        have Programming Language

        '
      - ':: Python :: 2 :: Only specified. Ideally you should also specify each major/minor
        version of Python

        '
      - 'that you do support, e.g. Programming Language :: Python :: 2.7.

        '
  - - TextContainer
    - - '2.3 Have good test coverage

        '
  - - TextContainer
    - - 'Once you have your code supporting the oldest version of Python 2 you want
        it to, you will want to make

        '
      - 'sure your test suite has good coverage. A good rule of thumb is that if you
        want to be confident enough in

        '
      - 'your test suite that any failures that appear after having tools rewrite
        your code are actual bugs in the tools

        '
      - "and not in your code. If you want a number to aim for, try to get over 80%\
        \ coverage (and don\u2019t feel bad if\n"
      - "you find it hard to get better than 90% coverage). If you don\u2019t already\
        \ have a tool to measure test coverage\n"
      - 'then coverage.py is recommended.

        '
  - - TextContainer
    - - '2.4 Learn the differences between Python 2 & 3

        '
  - - TextContainer
    - - 'Once you have your code well-tested you are ready to begin porting your code
        to Python 3! But to fully

        '
      - 'understand how your code is going to change and what you want to look out
        for while you code, you will

        '
      - 'want to learn what changes Python 3 makes in terms of Python 2. Typically
        the two best ways of doing

        '
      - "that is reading the \u201CWhat\u2019s New\u201D doc for each release of Python\
        \ 3 and the Porting to Python 3 book (which\n"
      - 'is free online). There is also a handy cheat sheet from the Python-Future
        project.

        '
  - - TextContainer
    - - '2.5 Update your code

        '
  - - TextContainer
    - - "Once you feel like you know what is different in Python 3 compared to Python\
        \ 2, it\u2019s time to update your\n"
      - 'code! You have a choice between two tools in porting your code automatically:
        Futurize and Modernize.

        '
      - 'Which tool you choose will depend on how much like Python 3 you want your
        code to be. Futurize does

        '
      - 'its best to make Python 3 idioms and practices exist in Python 2, e.g. backporting
        the bytes type from

        '
      - 'Python 3 so that you have semantic parity between the major versions of Python.
        Modernize, on the other

        '
      - 'hand, is more conservative and targets a Python 2/3 subset of Python, directly
        relying on six to help provide

        '
      - 'compatibility. As Python 3 is the future, it might be best to consider Futurize
        to begin adjusting to any

        '
      - 'new practices that Python 3 introduces which you are not accustomed to yet.

        '
      - 'Regardless of which tool you choose, they will update your code to run under
        Python 3 while staying

        '
      - 'compatible with the version of Python 2 you started with. Depending on how
        conservative you want to

        '
      - 'be, you may want to run the tool over your test suite first and visually
        inspect the diff to make sure the

        '
      - 'transformation is accurate. After you have transformed your test suite and
        verified that all the tests still pass

        '
      - 'as expected, then you can transform your application code knowing that any
        tests which fail is a translation

        '
      - 'failure.

        '
      - "Unfortunately the tools can\u2019t automate everything to make your code\
        \ work under Python 3 and so there are\n"
      - 'a handful of things you will need to update manually to get full Python 3
        support (which of these steps are

        '
      - 'necessary vary between the tools). Read the documentation for the tool you
        choose to use to see what it fixes

        '
      - 'by default and what it can do optionally to know what will (not) be fixed
        for you and what you may have

        '
      - 'to fix on your own (e.g. using io.open() over the built-in open() function
        is off by default in Modernize).

        '
      - 'Luckily, though, there are only a couple of things to watch out for which
        can be considered large issues that

        '
      - 'may be hard to debug if not watched for.

        '
  - - TextContainer
    - - '3

