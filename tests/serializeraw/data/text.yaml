- children:
  - - TextContainer
    - - 'Division

        '
  - - TextContainer
    - - 'In Python 3, 5 / 2 == 2.5 and not 2; all division between int values result
        in a float. This change has

        '
      - 'actually been planned since Python 2.2 which was released in 2002. Since
        then users have been encouraged

        '
      - 'to add from __future__ import division to any and all files which use the
        / and // operators or to be

        '
      - 'running the interpreter with the -Q flag. If you have not been doing this
        then you will need to go through

        '
      - 'your code and do two things:

        '
  - - TextContainer
    - - '1. Add from __future__ import division to your files

        '
      - '2. Update any division operator as necessary to either use // to use floor
        division or continue using / and

        '
  - - TextContainer
    - - 'expect a float

        '
  - - TextContainer
    - - "The reason that / isn\u2019t simply translated to // automatically is that\
        \ if an object defines a __truediv__\n"
      - 'method but not __floordiv__ then your code would begin to fail (e.g. a user-defined
        class that uses / to

        '
      - 'signify some operation but not // for the same thing or at all).

        '
  - - TextContainer
    - - 'Text versus binary data

        '
  - - TextContainer
    - - 'In Python 2 you could use the str type for both text and binary data. Unfortunately
        this confluence of

        '
      - 'two different concepts could lead to brittle code which sometimes worked
        for either kind of data, sometimes

        '
      - "not. It also could lead to confusing APIs if people didn\u2019t explicitly\
        \ state that something that accepted str\n"
      - 'accepted either text or binary data instead of one specific type. This complicated
        the situation especially

        '
      - "for anyone supporting multiple languages as APIs wouldn\u2019t bother explicitly\
        \ supporting unicode when they\n"
      - 'claimed text data support.

        '
      - 'To make the distinction between text and binary data clearer and more pronounced,
        Python 3 did what

        '
      - 'most languages created in the age of the internet have done and made text
        and binary data distinct types

        '
      - 'that cannot blindly be mixed together (Python predates widespread access
        to the internet). For any code

        '
      - "that deals only with text or only binary data, this separation doesn\u2019\
        t pose an issue. But for code that has\n"
      - 'to deal with both, it does mean you might have to now care about when you
        are using text compared to

        '
      - 'binary data, which is why this cannot be entirely automated.

        '
      - 'To start, you will need to decide which APIs take text and which take binary
        (it is highly recommended you

        '
      - "don\u2019t design APIs that can take both due to the difficulty of keeping\
        \ the code working; as stated earlier it\n"
      - 'is difficult to do well). In Python 2 this means making sure the APIs that
        take text can work with unicode

        '
      - 'and those that work with binary data work with the bytes type from Python
        3 (which is a subset of str

        '
      - 'in Python 2 and acts as an alias for bytes type in Python 2). Usually the
        biggest issue is realizing which

        '
      - "methods exist on which types in Python 2 & 3 simultaneously (for text that\u2019\
        s unicode in Python 2 and str\n"
      - "in Python 3, for binary that\u2019s str/bytes in Python 2 and bytes in Python\
        \ 3). The following table lists\n"
      - 'the unique methods of each data type across Python 2 & 3 (e.g., the decode()
        method is usable on the

        '
      - "equivalent binary data type in either Python 2 or 3, but it can\u2019t be\
        \ used by the textual data type consistently\n"
      - "between Python 2 and 3 because str in Python 3 doesn\u2019t have the method).\
        \ Do note that as of Python 3.5\n"
      - 'the __mod__ method was added to the bytes type.

        '
  - - TextContainer
    - - 'Text data Binary data

        '
  - - TextContainer
    - - 'decode

        '
  - - TextContainer
    - - 'encode

        '
      - 'format

        '
      - 'isdecimal

        '
      - 'isnumeric

        '
  - - TextContainer
    - - 'Making the distinction easier to handle can be accomplished by encoding and
        decoding between binary

        '
      - 'data and text at the edge of your code. This means that when you receive
        text in binary data, you should

        '
      - 'immediately decode it. And if your code needs to send text as binary data
        then encode it as late as possible.

        '
