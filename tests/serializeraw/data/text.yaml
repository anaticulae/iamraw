  - - TextContainer
    - - 'With Python 3 being the future of Python while Python 2 is still in active
        use, it is good to have your

        '
      - 'project available for both major releases of Python. This guide is meant
        to help you figure out how best

        '
      - 'to support both Python 2 & 3 simultaneously.

        '
      - 'If you are looking to port an extension module instead of pure Python code,
        please see cporting-howto.

        '
      - "If you would like to read one core Python developer\u2019s take on why Python\
        \ 3 came into existence, you can\n"
      - "read Nick Coghlan\u2019s Python 3 Q & A or Brett Cannon\u2019s Why Python\
        \ 3 exists.\n"
      - 'For help with porting, you can email the python-porting mailing list with
        questions.

        '
