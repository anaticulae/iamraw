  page: 5
- children:
  - - TextContainer
    - - 'import sys

        '
  - - TextContainer
    - - 'if sys.version_info[0] == 3:

        '
      - 'from importlib import abc

        '
  - - TextContainer
    - - 'else:

        '
  - - TextContainer
    - - 'from importlib2 import abc

        '
  - - TextContainer
    - - 'The problem with this code is what happens when Python 4 comes out? It would
        be better to treat Python 2

        '
      - 'as the exceptional case instead of Python 3 and assume that future Python
        versions will be more compatible

        '
      - 'with Python 3 than Python 2:

        '
  - - TextContainer
    - - 'import sys

        '
  - - TextContainer
    - - 'if sys.version_info[0] > 2:

        '
  - - TextContainer
    - - 'from importlib import abc

        '
  - - TextContainer
    - - 'else:

        '
  - - TextContainer
    - - 'from importlib2 import abc

        '
  - - TextContainer
    - - 'The best solution, though, is to do no version detection at all and instead
        rely on feature detection. That

        '
      - 'avoids any potential issues of getting the version detection wrong and helps
        keep you future-compatible:

        '
  - - TextContainer
    - - 'try:

        '
  - - TextContainer
    - - 'from importlib import abc

        '
  - - TextContainer
    - - 'except ImportError:

        '
  - - TextContainer
    - - 'from importlib2 import abc

        '
  - - TextContainer
    - - '2.6 Prevent compatibility regressions

        '
  - - TextContainer
    - - 'Once you have fully translated your code to be compatible with Python 3,
        you will want to make sure your

        '
