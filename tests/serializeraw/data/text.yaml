      - 'of which version you typically run your tests under while developing.

        '
  - - TextContainer
    - - '2.10 Consider using optional static type checking

        '
  - - TextContainer
    - - 'Another way to help port your code is to use a static type checker like mypy
        or pytype on your code. These

        '
