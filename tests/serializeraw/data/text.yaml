- children:
  - - TextContainer
    - - - '2.2 Make sure you specify the proper version support in your setup.py file

          '
        - - 0 74 11.96 0.00
  - - TextContainer
    - - - 'In your setup.py file you should have the proper trove classifier specifying
          what versions of Python you

          '
        - - 0 103 9.96 0.00
      - - 'support. As your project does not support Python 3 yet you should at least
          have Programming Language

          '
        - - 0 101 9.96 0.00
      - - ':: Python :: 2 :: Only specified. Ideally you should also specify each
          major/minor version of Python

          '
        - - 0 100 9.96 0.00
      - - 'that you do support, e.g. Programming Language :: Python :: 2.7.

          '
        - - 0 65 9.96 0.00
  - - TextContainer
    - - - '2.3 Have good test coverage

          '
        - - 0 28 11.96 0.00
  - - TextContainer
    - - - 'Once you have your code supporting the oldest version of Python 2 you want
          it to, you will want to make

          '
        - - 0 104 9.96 0.00
      - - 'sure your test suite has good coverage. A good rule of thumb is that if
          you want to be confident enough in

          '
        - - 0 106 9.96 0.00
      - - 'your test suite that any failures that appear after having tools rewrite
          your code are actual bugs in the tools

          '
        - - 0 112 9.96 0.00
      - - "and not in your code. If you want a number to aim for, try to get over\
          \ 80% coverage (and don\u2019t feel bad if\n"
        - - 0 107 9.96 0.00
      - - "you find it hard to get better than 90% coverage). If you don\u2019t already\
          \ have a tool to measure test coverage\n"
        - - 0 108 9.96 0.00
      - - 'then coverage.py is recommended.

          '
        - - 0 33 9.96 0.00
  - - TextContainer
    - - - '2.4 Learn the differences between Python 2 & 3

          '
        - - 0 46 11.96 0.00
  - - TextContainer
    - - - 'Once you have your code well-tested you are ready to begin porting your
          code to Python 3! But to fully

          '
        - - 0 103 9.96 0.00
      - - 'understand how your code is going to change and what you want to look out
          for while you code, you will

          '
        - - 0 103 9.96 0.00
      - - 'want to learn what changes Python 3 makes in terms of Python 2. Typically
          the two best ways of doing

          '
        - - 0 101 9.96 0.00
      - - "that is reading the \u201CWhat\u2019s New\u201D doc for each release of\
          \ Python 3 and the Porting to Python 3 book (which\n"
        - - 0 106 9.96 0.00
      - - 'is free online). There is also a handy cheat sheet from the Python-Future
          project.

          '
        - - 0 83 9.96 0.00
  - - TextContainer
    - - - '2.5 Update your code

          '
        - - 0 21 11.96 0.00
  - - TextContainer
    - - - "Once you feel like you know what is different in Python 3 compared to Python\
          \ 2, it\u2019s time to update your\n"
        - - 0 104 9.96 0.00
      - - 'code! You have a choice between two tools in porting your code automatically:
          Futurize and Modernize.

          '
        - - 0 102 9.96 0.00
      - - 'Which tool you choose will depend on how much like Python 3 you want your
          code to be. Futurize does

          '
        - - 0 100 9.96 0.00
      - - 'its best to make Python 3 idioms and practices exist in Python 2, e.g.
          backporting the bytes type from

          '
        - - 0 103 9.96 0.00
      - - 'Python 3 so that you have semantic parity between the major versions of
          Python. Modernize, on the other

          '
        - - 0 104 9.96 0.00
      - - 'hand, is more conservative and targets a Python 2/3 subset of Python, directly
          relying on six to help provide

          '
        - - 0 110 9.96 0.00
      - - 'compatibility. As Python 3 is the future, it might be best to consider
          Futurize to begin adjusting to any

          '
        - - 0 106 9.96 0.00
      - - 'new practices that Python 3 introduces which you are not accustomed to
          yet.

          '
        - - 0 76 9.96 0.00
      - - 'Regardless of which tool you choose, they will update your code to run
          under Python 3 while staying

          '
        - - 0 100 9.96 0.00
      - - 'compatible with the version of Python 2 you started with. Depending on
          how conservative you want to

          '
        - - 0 100 9.96 0.00
      - - 'be, you may want to run the tool over your test suite first and visually
          inspect the diff to make sure the

          '
        - - 0 105 9.96 0.00
      - - 'transformation is accurate. After you have transformed your test suite
          and verified that all the tests still pass

          '
        - - 0 113 9.96 0.00
      - - 'as expected, then you can transform your application code knowing that
          any tests which fail is a translation

          '
        - - 0 109 9.96 0.00
      - - 'failure.

          '
        - - 0 9 9.96 0.00
      - - "Unfortunately the tools can\u2019t automate everything to make your code\
          \ work under Python 3 and so there are\n"
        - - 0 105 9.96 0.00
      - - 'a handful of things you will need to update manually to get full Python
          3 support (which of these steps are

          '
        - - 0 108 9.96 0.00
      - - 'necessary vary between the tools). Read the documentation for the tool
          you choose to use to see what it fixes

          '
        - - 0 109 9.96 0.00
      - - 'by default and what it can do optionally to know what will (not) be fixed
          for you and what you may have

          '
        - - 0 103 9.96 0.00
      - - 'to fix on your own (e.g. using io.open() over the built-in open() function
          is off by default in Modernize).

          '
        - - 0 106 9.96 0.00
      - - 'Luckily, though, there are only a couple of things to watch out for which
          can be considered large issues that

          '
        - - 0 110 9.96 0.00
      - - 'may be hard to debug if not watched for.

          '
        - - 0 41 9.96 0.00
